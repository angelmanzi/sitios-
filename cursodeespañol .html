<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Curso de Espanhol · 15 Capítulos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#FFF8F0;color:#2C2C2A;min-height:100vh;padding:1.5rem 1rem 3rem}
.wrap{max-width:680px;margin:0 auto}
.hero{background:#F5A623;border-radius:16px;padding:2rem 1.5rem 1.5rem;margin-bottom:1.5rem;position:relative;overflow:hidden}
.hero::before{content:'🇪🇸';font-size:90px;position:absolute;right:-10px;top:-10px;opacity:.15}
.hero h1{font-family:'Playfair Display',serif;font-size:24px;color:#4A1B0C;margin-bottom:4px}
.hero p{font-size:13px;color:#712B13}
.tab-bar{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab-btn{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;padding:7px 13px;border-radius:50px;border:2px solid #F5A623;background:#fff;color:#4A1B0C;cursor:pointer;transition:all .2s}
.tab-btn.active{background:#F5A623}
.tab-btn:hover:not(.active){background:#FAEEDA}
.chapter{display:none}
.chapter.active{display:block}
.progress-bar{background:#E8E8E8;border-radius:50px;height:7px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;border-radius:50px;background:#F5A623;transition:width .4s}
.ch-header{display:flex;align-items:center;gap:12px;margin-bottom:1.2rem}
.ch-badge{background:#F5A623;color:#4A1B0C;font-size:11px;font-weight:700;padding:4px 12px;border-radius:50px;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.ch-title{font-family:'Playfair Display',serif;font-size:19px;color:#2C2C2A}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888780;margin:1.2rem 0 .6rem}
.tip-box{background:#FAEEDA;border-left:3px solid #F5A623;border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:1rem}
.tip-label{font-size:11px;font-weight:700;color:#BA7517;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.tip-box p{font-size:13px;color:#633806;line-height:1.6}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1rem}
.vocab-card{background:#fff;border:1px solid #E0DDD6;border-radius:10px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .18s;user-select:none}
.vocab-card:hover{border-color:#F5A623;background:#FAEEDA}
.vocab-card.flipped{background:#F5A623;border-color:#EF9F27}
.vc-es{font-size:14px;font-weight:700;color:#2C2C2A}
.vc-tr{font-size:12px;color:#888780;margin-top:4px}
.vocab-card.flipped .vc-es{color:#4A1B0C}
.vocab-card.flipped .vc-tr{color:#712B13}
.dialog-box{background:#F5F0EA;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem}
.dialog-line{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.dialog-line:last-child{margin-bottom:0}
.dl-name{font-size:11px;font-weight:700;color:#BA7517;min-width:60px;margin-top:3px;flex-shrink:0}
.dl-text{font-size:14px;color:#2C2C2A;line-height:1.5}
.dl-tr{font-size:12px;color:#888780;margin-top:3px}
.quiz-box{border:1px solid #E0DDD6;border-radius:14px;padding:1rem 1.25rem;background:#fff}
.quiz-q{font-size:15px;font-weight:700;color:#2C2C2A;margin-bottom:1rem}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{font-family:'Nunito',sans-serif;background:#fff;border:1px solid #D3D1C7;border-radius:10px;padding:10px 14px;font-size:14px;color:#2C2C2A;cursor:pointer;text-align:left;transition:all .15s}
.quiz-opt:hover:not(:disabled){background:#FAEEDA;border-color:#F5A623}
.quiz-opt:disabled{cursor:default}
.quiz-opt.correct{background:#EAF3DE;border-color:#639922;color:#27500A;font-weight:700}
.quiz-opt.wrong{background:#FCEBEB;border-color:#E24B4A;color:#501313}
.quiz-result{font-size:14px;margin-top:10px;font-weight:700;min-height:22px}
.quiz-result.ok{color:#3B6D11}
.quiz-result.no{color:#A32D2D}
.quiz-next{font-family:'Nunito',sans-serif;margin-top:12px;font-size:13px;font-weight:700;padding:9px 22px;border-radius:50px;border:2px solid #F5A623;background:#F5A623;color:#4A1B0C;cursor:pointer;display:none}
.quiz-next.show{display:inline-block}
.quiz-next:hover{background:#EF9F27}
.completed-box{text-align:center;padding:1.5rem}
.completed-box .trophy{font-size:40px}
.completed-box h3{font-size:17px;font-weight:700;color:#2C2C2A;margin-top:10px}
.completed-box p{font-size:13px;color:#888780;margin-top:5px}
.footer{text-align:center;margin-top:2.5rem;font-size:12px;color:#B4B2A9}
@media(max-width:420px){.hero h1{font-size:20px}.tab-btn{font-size:11px;padding:6px 10px}.vocab-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>

// ── STATE ──────────────────────────────────────────────
const qState = CHAPTERS.map(() => 0);

// ── BUILD UI ───────────────────────────────────────────
function buildTabs() {
  const bar = document.getElementById('tabBar');
  CHAPTERS.forEach((ch, i) => {
    const b = document.createElement('button');
    b.className = 'tab-btn' + (i === 0 ? ' active' : '');
    b.textContent = ch.tab;
    b.onclick = () => showChapter(i, b);
    bar.appendChild(b);
  });
}

function buildChapters() {
  const container = document.getElementById('chaptersContainer');
  CHAPTERS.forEach((ch, i) => {
    const pct = Math.round(((i + 1) / CHAPTERS.length) * 100);
    const div = document.createElement('div');
    div.className = 'chapter' + (i === 0 ? ' active' : '');
    div.id = 'ch' + i;
    div.innerHTML = `
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="ch-header">
        <span class="ch-badge">Capítulo ${i + 1}</span>
        <h2 class="ch-title">${ch.title}</h2>
      </div>
      <div class="tip-box"><div class="tip-label">💡 Dica</div><p>${ch.tip}</p></div>
      <div class="section-label">Vocabulário · toque para ver a tradução</div>
      <div class="vocab-grid">${ch.vocab.map(v =>
        `<div class="vocab-card" onclick="flip(this)"><div class="vc-es">${v.es}</div><div class="vc-tr">Toque para ver</div></div>`
      ).join('')}</div>
      <div class="section-label">Diálogo de exemplo</div>
      <div class="dialog-box">${ch.dialog.map(d =>
        `<div class="dialog-line"><div class="dl-name">${d.name}</div><div><div class="dl-text">${d.es}</div><div class="dl-tr">${d.pt}</div></div></div>`
      ).join('')}</div>
      <div class="section-label">Mini Quiz</div>
      <div class="quiz-box" id="quiz${i}">
        ${buildQuizHTML(i, 0)}
      </div>`;
    container.appendChild(div);
  });
}

function buildQuizHTML(chIdx, qIdx) {
  const q = CHAPTERS[chIdx].quiz[qIdx];
  return `
    <div class="quiz-q" id="q${chIdx}-text">${q.q}</div>
    <div class="quiz-opts" id="q${chIdx}-opts">
      ${q.opts.map((opt, i) =>
        `<button class="quiz-opt" onclick="checkQ(${chIdx},'${i === q.c ? 'correct' : 'wrong'}',this)">${opt}</button>`
      ).join('')}
    </div>
    <div class="quiz-result" id="q${chIdx}-result"></div>
    <button class="quiz-next" id="q${chIdx}-next" onclick="${qIdx < CHAPTERS[chIdx].quiz.length - 1 ? `nextQ(${chIdx})` : `showCompleted(${chIdx})`}">
      ${qIdx < CHAPTERS[chIdx].quiz.length - 1 ? 'Próxima pergunta →' : (chIdx < CHAPTERS.length - 1 ? 'Próximo capítulo →' : '🏆 Ver resultado final →')}
    </button>`;
}

// ── INTERACTIONS ───────────────────────────────────────
function flip(card) {
  const es = card.querySelector('.vc-es').textContent;
  const trEl = card.querySelector('.vc-tr');
  const chIdx = [...document.querySelectorAll('.chapter')].findIndex(c => c.contains(card));
  if (!card.classList.contains('flipped')) {
    const found = CHAPTERS[chIdx]?.vocab.find(v => v.es === es);
    trEl.textContent = found ? found.pt : '...';
    card.classList.add('flipped');
  } else {
    trEl.textContent = 'Toque para ver';
    card.classList.remove('flipped');
  }
}

function showChapter(idx, btn) {
  document.querySelectorAll('.chapter').forEach((c, i) => c.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function checkQ(chIdx, result, btn) {
  const opts = btn.closest('.quiz-opts').querySelectorAll('.quiz-opt');
  opts.forEach(o => { o.disabled = true; });
  btn.classList.add(result);
  const resultEl = document.getElementById('q' + chIdx + '-result');
  const nextEl   = document.getElementById('q' + chIdx + '-next');
  if (result === 'correct') {
    resultEl.textContent = '¡Correcto! 🎉 Muito bem!';
    resultEl.className = 'quiz-result ok';
  } else {
    const correctBtn = Array.from(opts).find(o => o.getAttribute('onclick').includes("'correct'"));
    if (correctBtn) correctBtn.classList.add('correct');
    resultEl.textContent = 'Quase! A resposta certa está em verde.';
    resultEl.className = 'quiz-result no';
  }
  nextEl.classList.add('show');
}

function nextQ(chIdx) {
  qState[chIdx]++;
  const q = CHAPTERS[chIdx].quiz[qIdx = qState[chIdx]];
  document.getElementById('q' + chIdx + '-text').textContent = q.q;
  const optsEl = document.getElementById('q' + chIdx + '-opts');
  optsEl.innerHTML = q.opts.map((opt, i) =>
    `<button class="quiz-opt" onclick="checkQ(${chIdx},'${i === q.c ? 'correct' : 'wrong'}',this)">${opt}</button>`
  ).join('');
  document.getElementById('q' + chIdx + '-result').textContent = '';
  document.getElementById('q' + chIdx + '-result').className = 'quiz-result';
  const nextEl = document.getElementById('q' + chIdx + '-next');
  nextEl.classList.remove('show');
  const isLast = qState[chIdx] >= CHAPTERS[chIdx].quiz.length - 1;
  nextEl.textContent = isLast ? (chIdx < CHAPTERS.length - 1 ? 'Próximo capítulo →' : '🏆 Ver resultado final →') : 'Próxima pergunta →';
  nextEl.onclick = isLast ? () => showCompleted(chIdx) : () => nextQ(chIdx);
}

function showCompleted(chIdx) {
  const isLast = chIdx === CHAPTERS.length - 1;
  const nextChBtn = document.querySelectorAll('.tab-btn')[chIdx + 1];
  document.getElementById('quiz' + chIdx).innerHTML =
    `<div class="completed-box">
      <div class="trophy">${isLast ? '🏆' : '⭐'}</div>
      <h3>${isLast ? 'Parabéns! Você concluiu os 20 capítulos!' : 'Capítulo concluído! ¡Muy bien!'}</h3>
      <p>${isLast ? '¡Eres increíble! Continue praticando todos os dias.' : 'Passe para o próximo capítulo.'}</p>
      ${!isLast ? `<button class="quiz-next show" style="margin-top:14px" onclick="showChapter(${chIdx+1}, document.querySelectorAll('.tab-btn')[${chIdx+1}])">Ir ao capítulo ${chIdx + 2} →</button>` : ''}
    </div>`;
}

var qIdx = 0;
buildTabs();
buildChapters();
</script>
